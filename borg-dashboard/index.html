<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Titanium Core — Panel de Control de Citas</title>
    <meta
      name="description"
      content="Panel de control de citas del Taller Titanium. Gestión de agendados, notificaciones y estado en tiempo real."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-primary: #0a0e1a;
        --bg-secondary: #111827;
        --bg-card: #1a2236;
        --bg-card-hover: #1e2a42;
        --border: #2a3654;
        --border-accent: #3b82f6;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --accent-blue: #3b82f6;
        --accent-blue-light: #60a5fa;
        --accent-cyan: #22d3ee;
        --accent-green: #2ecc71;
        --accent-yellow: #f59e0b;
        --accent-red: #ef4444;
        --accent-purple: #a78bfa;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.5);
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 16px;
        --radius-full: 9999px;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }

      /* Background grid effect */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        max-width: 72rem;
        margin: 0 auto;
        padding: 1.25rem;
        position: relative;
        z-index: 1;
      }

      @media (min-width: 768px) {
        .container {
          padding: 2rem;
        }
      }

      /* Header */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 1rem;
      }

      .header-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .header-icon {
        width: 44px;
        height: 44px;
        background: linear-gradient(
          135deg,
          var(--accent-blue),
          var(--accent-cyan)
        );
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
      }

      .header h1 {
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.025em;
        background: linear-gradient(
          135deg,
          var(--accent-blue-light),
          var(--accent-cyan)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .header p {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .header-actions {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.5rem 1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--bg-secondary);
        color: var(--text-secondary);
        font-family: inherit;
        font-size: 0.8rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s ease;
        text-decoration: none;
        white-space: nowrap;
      }

      .btn:hover {
        background: var(--bg-card-hover);
        color: var(--text-primary);
        border-color: var(--accent-blue);
      }

      .btn-primary {
        background: var(--accent-blue);
        color: #fff;
        border-color: var(--accent-blue);
      }

      .btn-primary:hover {
        background: #2563eb;
        border-color: #2563eb;
      }

      .btn svg {
        width: 16px;
        height: 16px;
      }

      /* Status bar */
      .status-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        padding: 1rem 1.25rem;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        margin-bottom: 1.5rem;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.25rem 0.75rem;
        border-radius: var(--radius-full);
        font-size: 0.8rem;
        font-weight: 500;
        background: var(--bg-card);
        border: 1px solid var(--border);
      }

      .badge-count {
        font-weight: 700;
        font-family: "JetBrains Mono", monospace;
      }

      .badge-pending {
        border-color: rgba(245, 158, 11, 0.4);
        color: var(--accent-yellow);
      }
      .badge-confirmed {
        border-color: rgba(46, 204, 113, 0.4);
        color: var(--accent-green);
      }
      .badge-total {
        border-color: rgba(59, 130, 246, 0.4);
        color: var(--accent-blue-light);
      }

      .status-bar .spacer {
        flex-grow: 1;
      }

      .filter-select {
        background: var(--bg-card);
        color: var(--text-secondary);
        border: 1px solid var(--border);
        padding: 0.4rem 0.75rem;
        border-radius: var(--radius-sm);
        font-family: inherit;
        font-size: 0.8rem;
        cursor: pointer;
        transition: border-color 0.15s;
      }

      .filter-select:focus {
        outline: none;
        border-color: var(--accent-blue);
      }

      /* Live indicator */
      .live-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent-green);
        display: inline-block;
        animation: pulse-dot 2s ease-in-out infinite;
      }

      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 1;
          box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.4);
        }
        50% {
          opacity: 0.7;
          box-shadow: 0 0 0 6px rgba(46, 204, 113, 0);
        }
      }

      .live-label {
        font-size: 0.75rem;
        color: var(--accent-green);
        font-weight: 600;
      }

      /* Date group */
      .date-group {
        margin-bottom: 1.75rem;
      }

      .date-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }

      .date-badge {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--accent-cyan);
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        padding: 0.3rem 0.85rem;
        border-radius: var(--radius-sm);
        letter-spacing: 0.025em;
      }

      .date-count {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      /* Appointment card */
      .card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-left: 4px solid var(--accent-blue);
        padding: 1rem 1.25rem;
        border-radius: var(--radius-md);
        margin-bottom: 0.5rem;
        transition: all 0.15s ease;
        box-shadow: var(--shadow-sm);
      }

      .card:hover {
        background: var(--bg-card-hover);
        border-left-color: var(--accent-cyan);
        box-shadow: var(--shadow-md);
        transform: translateY(-1px);
      }

      .card-info {
        flex: 1;
        min-width: 0;
      }

      .card-time {
        font-family: "JetBrains Mono", monospace;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--accent-blue-light);
      }

      .card-vehicle {
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text-primary);
        margin-top: 0.15rem;
      }

      .card-service {
        font-size: 0.8rem;
        color: var(--text-secondary);
        margin-top: 0.2rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .card-meta {
        text-align: right;
        flex-shrink: 0;
        margin-left: 1rem;
      }

      .card-status {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 0.2rem 0.6rem;
        border-radius: var(--radius-full);
        display: inline-block;
      }

      .card-status--pendiente {
        color: var(--accent-yellow);
        background: rgba(245, 158, 11, 0.12);
        border: 1px solid rgba(245, 158, 11, 0.25);
      }

      .card-status--confirmado {
        color: var(--accent-green);
        background: rgba(46, 204, 113, 0.12);
        border: 1px solid rgba(46, 204, 113, 0.25);
      }

      .card-status--completado {
        color: var(--accent-blue-light);
        background: rgba(59, 130, 246, 0.12);
        border: 1px solid rgba(59, 130, 246, 0.25);
      }

      .card-ticket {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        color: var(--text-muted);
        margin-top: 0.3rem;
      }

      /* Empty state */
      .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        color: var(--text-muted);
      }

      .empty-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        opacity: 0.5;
      }

      .empty-title {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 0.5rem;
      }

      /* Loading */
      .loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 4rem 2rem;
        gap: 1rem;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border);
        border-top-color: var(--accent-blue);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      /* Error */
      .error-banner {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
        padding: 1rem 1.25rem;
        border-radius: var(--radius-md);
        text-align: center;
        margin-bottom: 1.5rem;
      }

      .error-banner strong {
        color: #f87171;
      }

      /* Auth gate */
      .auth-gate {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        text-align: center;
        padding: 2rem;
      }

      .auth-gate h2 {
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }

      .auth-gate p {
        color: var(--text-muted);
        font-size: 0.9rem;
        max-width: 400px;
      }

      .auth-input {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0.65rem 1rem;
        color: var(--text-primary);
        font-family: inherit;
        font-size: 0.9rem;
        width: 100%;
        max-width: 320px;
        margin-top: 1.25rem;
        text-align: center;
      }

      .auth-input:focus {
        outline: none;
        border-color: var(--accent-blue);
      }

      .auth-input::placeholder {
        color: var(--text-muted);
      }

      /* Last update */
      .last-update {
        text-align: center;
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 2rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }

      @media (max-width: 640px) {
        .card {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.5rem;
        }
        .card-meta {
          text-align: left;
          margin-left: 0;
        }
        .header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="container" id="app">
      <!-- Rendered by JS -->
    </div>

    <script>
      (function () {
        "use strict";

        // --- State ---
        var TOKEN_KEY = "borg_dashboard_token";
        var API_BASE = "https://borg-core-worker.marketceogjr.workers.dev/api";
        var currentData = [];
        var lastUpdate = null;

        function getToken() {
          var params = new URLSearchParams(window.location.search);
          return params.get("token") || sessionStorage.getItem(TOKEN_KEY) || "";
        }

        function setToken(t) {
          sessionStorage.setItem(TOKEN_KEY, t);
        }

        function esc(s) {
          var d = document.createElement("div");
          d.textContent = String(s != null ? s : "");
          return d.innerHTML;
        }

        function apiUrl(path, extraParams) {
          var token = getToken();
          var p = new URLSearchParams(extraParams || {});
          if (token) p.set("token", token);
          var qs = p.toString();
          return path + (qs ? "?" + qs : "");
        }

        // --- Auth Gate ---
        function renderAuthGate() {
          document.getElementById("app").innerHTML =
            '<div class="auth-gate">' +
            '<div class="header-icon" style="width:64px;height:64px;font-size:2rem;margin-bottom:1.5rem;">&#x1F539;</div>' +
            "<h2>Panel de Control Titanium</h2>" +
            "<p>Este panel requiere autenticacion. Ingresa tu token de acceso para continuar.</p>" +
            '<input type="password" class="auth-input" id="auth-token-input" placeholder="Ingresa token de acceso" autofocus>' +
            '<button class="btn btn-primary" style="margin-top:0.75rem;" id="auth-submit-btn">Acceder al Panel</button>' +
            "</div>";

          var input = document.getElementById("auth-token-input");
          var btn = document.getElementById("auth-submit-btn");

          btn.addEventListener("click", function () {
            attemptAuth(input.value);
          });
          input.addEventListener("keydown", function (e) {
            if (e.key === "Enter") attemptAuth(input.value);
          });
        }

        function attemptAuth(token) {
          if (!token) return;
          setToken(token);

          // Clean URL
          var url = new URL(window.location);
          url.searchParams.delete("token");
          window.history.replaceState({}, "", url.pathname);

          fetchAppointments();
        }

        // --- Dashboard ---
        function renderDashboard() {
          var token = getToken();
          if (!token) {
            renderAuthGate();
            return;
          }

          document.getElementById("app").innerHTML =
            '<header class="header">' +
            '<div class="header-brand">' +
            '<div class="header-icon">&#x1F539;</div>' +
            "<div>" +
            "<h1>Titanium Core</h1>" +
            "<p>Panel de Control de Citas</p>" +
            "</div>" +
            "</div>" +
            '<div class="header-actions">' +
            '<button class="btn" id="btn-notifs">&#x1F514; Notificaciones</button>' +
            '<button class="btn" id="btn-export" title="Exportar CSV">&#x1F4CA; Exportar</button>' +
            '<button class="btn btn-primary" id="btn-refresh">&#x1F504; Actualizar</button>' +
            "</div>" +
            "</header>" +
            '<div class="status-bar" id="status-bar">' +
            '<span class="live-dot"></span>' +
            '<span class="live-label">En vivo</span>' +
            '<div class="spacer"></div>' +
            '<div id="summary-badges"></div>' +
            '<div class="spacer"></div>' +
            '<select class="filter-select" id="status-filter">' +
            '<option value="">Todos los estados</option>' +
            '<option value="pendiente">Pendientes</option>' +
            '<option value="confirmado">Confirmados</option>' +
            "</select>" +
            "</div>" +
            '<div id="content-area">' +
            '<div class="loading"><div class="spinner"></div><span class="loading-text">Cargando citas...</span></div>' +
            "</div>" +
            '<div class="last-update" id="last-update"></div>';

          document
            .getElementById("btn-refresh")
            .addEventListener("click", fetchAppointments);
          document
            .getElementById("btn-export")
            .addEventListener("click", exportCSV);
          document
            .getElementById("btn-notifs")
            .addEventListener("click", showNotifications);
          document
            .getElementById("status-filter")
            .addEventListener("change", fetchAppointments);

          fetchAppointments();
        }

        async function fetchAppointments() {
          var area = document.getElementById("content-area");
          if (!area) return;

          var token = getToken();
          if (!token) {
            renderAuthGate();
            return;
          }

          var status = document.getElementById("status-filter")
            ? document.getElementById("status-filter").value
            : "";

          area.innerHTML =
            '<div class="loading"><div class="spinner"></div><span class="loading-text">Consultando base de datos...</span></div>';

          try {
            var res = await fetch(
              apiUrl(
                API_BASE + "/appointments",
                status ? { status: status } : {},
              ),
            );
            if (res.status === 401) {
              sessionStorage.removeItem(TOKEN_KEY);
              renderAuthGate();
              return;
            }
            if (!res.ok) {
              var errBody = await res.json().catch(function () {
                return {};
              });
              throw new Error(errBody.error || "HTTP " + res.status);
            }
            var data = await res.json();
            currentData = data;
            lastUpdate = new Date();
            updateSummary(data);
            renderCards(data);
            updateLastUpdate();
          } catch (err) {
            area.innerHTML =
              '<div class="error-banner"><strong>Error de conexion</strong><br>' +
              esc(err.message) +
              '<br><button class="btn btn-primary" style="margin-top:0.75rem;" onclick="location.reload()">Reintentar</button></div>';
          }
        }

        function updateSummary(data) {
          var el = document.getElementById("summary-badges");
          if (!el) return;
          var total = data.length;
          var pend = 0,
            conf = 0;
          for (var i = 0; i < data.length; i++) {
            if (data[i].estado === "pendiente") pend++;
            if (data[i].estado === "confirmado") conf++;
          }
          el.innerHTML =
            '<span class="badge badge-total"><span class="badge-count">' +
            total +
            "</span> Total</span>" +
            '<span class="badge badge-pending"><span class="badge-count">' +
            pend +
            "</span> Pendientes</span>" +
            '<span class="badge badge-confirmed"><span class="badge-count">' +
            conf +
            "</span> Confirmados</span>";
        }

        function renderCards(data) {
          var area = document.getElementById("content-area");
          if (!area) return;

          if (!data || data.length === 0) {
            area.innerHTML =
              '<div class="empty-state">' +
              '<div class="empty-icon">&#x1F4ED;</div>' +
              '<div class="empty-title">No hay citas programadas</div>' +
              '<div style="color:var(--text-muted);font-size:0.85rem;">Las citas aparecen aqui una vez confirmadas.</div>' +
              "</div>";
            return;
          }

          // Group by date
          var grouped = {};
          for (var i = 0; i < data.length; i++) {
            var dateKey = data[i].fecha_cita || "sin-fecha";
            if (!grouped[dateKey]) grouped[dateKey] = [];
            grouped[dateKey].push(data[i]);
          }

          var dates = Object.keys(grouped).sort();
          var html = "";

          for (var di = 0; di < dates.length; di++) {
            var date = dates[di];
            var appts = grouped[date].sort(function (a, b) {
              return (a.hora_cita || "").localeCompare(b.hora_cita || "");
            });

            html += '<div class="date-group">';
            html += '<div class="date-header">';
            html += '<span class="date-badge">' + esc(date) + "</span>";
            html +=
              '<span class="date-count">' +
              appts.length +
              " cita" +
              (appts.length !== 1 ? "s" : "") +
              "</span>";
            html += "</div>";

            for (var ai = 0; ai < appts.length; ai++) {
              var a = appts[ai];
              var statusClass = "card-status--" + (a.estado || "pendiente");
              html += '<div class="card">';
              html += '<div class="card-info">';
              html +=
                '<div class="card-time">' +
                esc(a.hora_cita || "--:--") +
                "</div>";
              html +=
                '<div class="card-vehicle">' +
                esc(a.vehiculo_tipo || "N/A") +
                "</div>";
              html +=
                '<div class="card-service">' +
                esc(a.servicio_solicitado || "N/A") +
                "</div>";
              html += "</div>";
              html += '<div class="card-meta">';
              html +=
                '<div class="card-status ' +
                statusClass +
                '">' +
                esc(a.estado || "N/A") +
                "</div>";
              html +=
                '<div class="card-ticket">' + esc(a.ticket_id || "") + "</div>";
              html += "</div>";
              html += "</div>";
            }

            html += "</div>";
          }

          area.innerHTML = html;
        }

        function updateLastUpdate() {
          var el = document.getElementById("last-update");
          if (!el || !lastUpdate) return;
          el.textContent =
            "Ultima actualizacion: " +
            lastUpdate.toLocaleTimeString("es-VE", {
              timeZone: "America/Caracas",
            }) +
            " (VET)";
        }

        function exportCSV() {
          if (!currentData || currentData.length === 0) return;
          var headers = [
            "Ticket ID",
            "Fecha",
            "Hora",
            "Vehiculo",
            "Servicio",
            "Estado",
          ];
          var lines = [headers.join(",")];
          for (var i = 0; i < currentData.length; i++) {
            var a = currentData[i];
            lines.push(
              [
                '"' + (a.ticket_id || "") + '"',
                '"' + (a.fecha_cita || "") + '"',
                '"' + (a.hora_cita || "") + '"',
                '"' + (a.vehiculo_tipo || "") + '"',
                '"' + (a.servicio_solicitado || "") + '"',
                '"' + (a.estado || "") + '"',
              ].join(","),
            );
          }
          var csv = lines.join("\n");
          var blob = new Blob(["\uFEFF" + csv], {
            type: "text/csv;charset=utf-8;",
          });
          var url = URL.createObjectURL(blob);
          var link = document.createElement("a");
          link.href = url;
          link.download =
            "citas-titanium-" + new Date().toISOString().slice(0, 10) + ".csv";
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
        }

        async function showNotifications() {
          var token = getToken();
          if (!token) return;

          var area = document.getElementById("content-area");
          if (!area) return;
          area.innerHTML =
            '<div class="loading"><div class="spinner"></div><span class="loading-text">Cargando notificaciones...</span></div>';

          try {
            var res = await fetch(apiUrl(API_BASE + "/notifications"));
            if (!res.ok) throw new Error("HTTP " + res.status);
            var body = await res.json();

            var html =
              '<div style="margin-bottom:1.5rem;display:flex;align-items:center;gap:0.5rem;">' +
              '<button class="btn" id="btn-back-citas" style="margin-right:auto;">&#x2190; Volver a Citas</button>' +
              "</div>";

            html +=
              '<div style="margin-bottom:1.5rem;"><h2 style="font-size:1.1rem;font-weight:700;color:var(--accent-blue-light);margin-bottom:0.75rem;">Citas Recientes</h2>';
            var tickets = body.tickets || [];
            if (tickets.length === 0) {
              html +=
                '<div style="color:var(--text-muted);font-size:0.85rem;">No hay citas recientes.</div>';
            } else {
              for (var i = 0; i < tickets.length; i++) {
                var t = tickets[i];
                html += '<div class="card" style="margin-bottom:0.4rem;">';
                html +=
                  '<div class="card-info"><div class="card-vehicle">' +
                  esc(t.ticket_id) +
                  '</div><div class="card-service">' +
                  esc(t.fecha_cita) +
                  " " +
                  esc(t.hora_cita) +
                  " | " +
                  esc(t.vehiculo_tipo) +
                  "</div></div>";
                html +=
                  '<div class="card-meta"><div class="card-status card-status--' +
                  (t.estado || "pendiente") +
                  '">' +
                  esc(t.estado || "N/A") +
                  "</div></div>";
                html += "</div>";
              }
            }
            html += "</div>";

            html +=
              '<div><h2 style="font-size:1.1rem;font-weight:700;color:var(--accent-purple);margin-bottom:0.75rem;">Eventos del Sistema</h2>';
            var notifs = body.notifications || [];
            if (notifs.length === 0) {
              html +=
                '<div style="color:var(--text-muted);font-size:0.85rem;">No hay eventos recientes.</div>';
            } else {
              for (var j = 0; j < notifs.length; j++) {
                var n = notifs[j];
                html +=
                  '<div class="card" style="margin-bottom:0.4rem;border-left-color:var(--accent-purple);">';
                html +=
                  '<div class="card-info"><div class="card-service">' +
                  esc(n.message) +
                  "</div></div>";
                html += "</div>";
              }
            }
            html += "</div>";

            area.innerHTML = html;
            document
              .getElementById("btn-back-citas")
              .addEventListener("click", function () {
                renderCards(currentData);
              });
          } catch (err) {
            area.innerHTML =
              '<div class="error-banner"><strong>Error</strong><br>' +
              esc(err.message) +
              "</div>";
          }
        }

        // --- Init ---
        var token = getToken();
        if (token) {
          renderDashboard();
        } else {
          renderAuthGate();
        }
      })();
    </script>
  </body>
</html>
