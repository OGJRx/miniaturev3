name = "borg-core-worker"
main = "src/index.ts"
compatibility_date = "2025-01-24"
compatibility_flags = ["nodejs_compat"]

[vars]
# Secretos (Configurar vía: wrangler secret put <NAME>)
# - FRONTEND_BOT_TOKEN
# - BACKEND_BOT_TOKEN
# - BORG_SECRET_KEY: MUST be a standalone 32-byte hex string (NOT a Cloudflare API token). Generate with scripts/rotate-borg-secret.sh.
# - GEMINI_API_KEY: Acceso directo a Google AI

# TELEGRAM_ADMIN_IDS movido a secret
AI_MODEL_NAME = "gemini-2.5-flash-lite"
BORG_VERSION = "9.7.0-TITANIUM"

# Información pre-cacheada de los bots (opcional)
FRONTEND_BOT_INFO = '{"id":7806101848,"is_bot":true,"first_name":"Borg Telegate","username":"borg_frontend_bot"}'
BACKEND_BOT_INFO = '{"id":6617778072,"is_bot":true,"first_name":"Borg Backend","username":"borg_backend_bot"}'

# UBICACIÓN DEL LOCAL (Precisión Milimétrica)
TALLER_LATITUD = "10.48855974863415"
TALLER_LONGITUD = "-66.88157077878705"
TALLER_MAPS_URL = "https://www.google.com/maps/search/?api=1&query=10.48855974863415,-66.88157077878705&query_place_id=Autodiagnostico+JR"


[[d1_databases]]
binding = "DB"
database_name = "borgptron-db"
database_id = "80185899-29c6-4888-9265-64c3dc49ba2f"

[triggers]
crons = [
  "*/2 * * * *"    # Master Cron (Unified Dispatcher)
]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
