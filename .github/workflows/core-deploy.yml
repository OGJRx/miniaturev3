name: 🔱 TITANIUM CORE - Unifed Pipeline

on:
  push:
    branches: ["titan", "main"]
  pull_request:
    branches: ["titan"]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  entropy-check:
    name: 🔬 Entropy Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: 🧹 Check for merge conflict markers
        run: |
          set -euo pipefail
          if git grep -E "^<<<<<<<|^=======|^>>>>>>>" -- . ':(exclude)node_modules'; then
            echo "❌ Merge conflict markers found in source code!"
            exit 1
          fi
      - name: 🔍 Any Scanner
        run: |
          set -euo pipefail
          ANY_COUNT=$(npm run any-scanner --silent | tail -n 1)
          echo "Any count: $ANY_COUNT"
          if [ "$ANY_COUNT" -gt 0 ]; then
            echo "❌ ERROR: Detected $ANY_COUNT 'any' usages. Zero tolerance."
            exit 1
          fi
      - name: 📝 Lint
        run: |
          set -euo pipefail
          npm run lint:strict
      - name: 📐 Type Check
        run: npm run check-types
      - name: 🧪 Tests
        run: npm run test
      - name: 🔐 Security Audit
        run: |
          set -euo pipefail
          npm audit --audit-level=high
          AUDIT_EXIT=$?
          if [ $AUDIT_EXIT -ne 0 ]; then
            echo "❌ Security audit failed with exit code $AUDIT_EXIT"
            exit $AUDIT_EXIT
          fi

  deploy-core:
    name: 🚀 Deploy Core
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    needs: entropy-check
    if: github.event_name == 'push'
    timeout-minutes: 15
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      BORG_SECRET_KEY: ${{ secrets.BORG_SECRET_KEY }}
      FRONTEND_BOT_TOKEN: ${{ secrets.FRONTEND_BOT_TOKEN }}
      BACKEND_BOT_TOKEN: ${{ secrets.BACKEND_BOT_TOKEN }}
      TELEGRAM_ADMIN_IDS: ${{ secrets.TELEGRAM_ADMIN_IDS }}

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --ignore-scripts

      - name: 🔐 Validate Secrets
        run: |
          MISSING=0
          SECRETS=(
            "CLOUDFLARE_ACCOUNT_ID"
            "CLOUDFLARE_API_TOKEN"
            "GEMINI_API_KEY"
            "BORG_SECRET_KEY"
            "FRONTEND_BOT_TOKEN"
            "BACKEND_BOT_TOKEN"
            "TELEGRAM_ADMIN_IDS"
            "WHATSAPP_ACCESS_TOKEN"
            "WHATSAPP_APP_SECRET"
            "WHATSAPP_VERIFY_TOKEN"
          )
          for secret in "${SECRETS[@]}"; do
            if [ -z "${!secret}" ]; then
              echo "::error::Missing secret: $secret"
              MISSING=1
            fi
          done
          if [ $MISSING -eq 1 ]; then
            exit 1
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BORG_SECRET_KEY: ${{ secrets.BORG_SECRET_KEY }}
          FRONTEND_BOT_TOKEN: ${{ secrets.FRONTEND_BOT_TOKEN }}
          BACKEND_BOT_TOKEN: ${{ secrets.BACKEND_BOT_TOKEN }}
          TELEGRAM_ADMIN_IDS: ${{ secrets.TELEGRAM_ADMIN_IDS }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_APP_SECRET: ${{ secrets.WHATSAPP_APP_SECRET }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}

      - name: 🛡️ Verify D1 Access
        run: |
          npx wrangler d1 execute borgptron-db --remote --command "SELECT 1;"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: borg-core-worker

      - name: 🗄️ Apply D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 migrations apply borgptron-db --remote
          workingDirectory: borg-core-worker
        # NOTE: GitHub OIDC Trust Relationship must be configured in Cloudflare Dashboard:
        # Workers & Pages > Settings > GitHub Actions OIDC.
        # Ensure the 'accountId' is provided and 'apiToken' is omitted or empty.

      - name: 🔱 Deploy Core Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
          workingDirectory: borg-core-worker
        # The output of wrangler deploy is captured by the action if we use it normally,
        # but to extract the URL we might need a custom command or check outputs.
        # Wrangler-action v3 provides 'deployment-url' output.

      - name: 🔗 Activate Webhooks
        working-directory: borg-core-worker
        env:
          BORG_SECRET_KEY: ${{ secrets.BORG_SECRET_KEY }}
          FRONTEND_BOT_TOKEN: ${{ secrets.FRONTEND_BOT_TOKEN }}
          BACKEND_BOT_TOKEN: ${{ secrets.BACKEND_BOT_TOKEN }}
        run: |
          set -euo pipefail
          CORE_URL="${{ steps.deploy.outputs.deployment-url }}"

          # Telegram Webhooks
          curl -fsS -X POST "https://api.telegram.org/bot${FRONTEND_BOT_TOKEN}/setWebhook" \
            -d "url=${CORE_URL}/webhook/frontend" \
            -d "secret_token=${BORG_SECRET_KEY}" | grep -q '"ok":true' || exit 1

          curl -fsS -X POST "https://api.telegram.org/bot${BACKEND_BOT_TOKEN}/setWebhook" \
            -d "url=${CORE_URL}/webhook/backend" \
            -d "secret_token=${BORG_SECRET_KEY}" | grep -q '"ok":true' || exit 1
          echo "✅ Webhooks activated"

      - name: 🔐 Sync Secrets
        uses: cloudflare/wrangler-action@v3
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BORG_SECRET_KEY: ${{ secrets.BORG_SECRET_KEY }}
          FRONTEND_BOT_TOKEN: ${{ secrets.FRONTEND_BOT_TOKEN }}
          BACKEND_BOT_TOKEN: ${{ secrets.BACKEND_BOT_TOKEN }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_APP_SECRET: ${{ secrets.WHATSAPP_APP_SECRET }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          TELEGRAM_ADMIN_IDS: ${{ secrets.TELEGRAM_ADMIN_IDS }}
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: borg-core-worker
          secrets: |
            GEMINI_API_KEY
            BORG_SECRET_KEY
            FRONTEND_BOT_TOKEN
            BACKEND_BOT_TOKEN
            TELEGRAM_ADMIN_IDS
            WHATSAPP_ACCESS_TOKEN
            WHATSAPP_APP_SECRET
            WHATSAPP_VERIFY_TOKEN
      - name: 📢 Notify Success
        if: success()
        continue-on-error: true
        run: |
          set -euo pipefail
          # Enviar notificación a todos los admins definidos en TELEGRAM_ADMIN_IDS
          IFS=',' read -ra ADM_IDS <<< "${{ secrets.TELEGRAM_ADMIN_IDS }}"
          for ADM_ID in "${ADM_IDS[@]}"; do
            curl -s -X POST "https://api.telegram.org/bot${BACKEND_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${ADM_ID}" \
              -d "text=✅ <b>TITANIUM CORE UNIFIED</b>%0A%0ADespliegue y sincronización de webhooks completada con éxito." \
              -d "parse_mode=HTML"
          done
