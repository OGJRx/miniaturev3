name: 🔱 TITANIUM CORE - Unifed Pipeline

on:
  push:
    branches: ["titan", "main"]
  pull_request:
    branches: ["titan"]
  workflow_dispatch:

env:
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  entropy-check:
    name: 🔬 Entropy Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: 🧹 Check for merge conflict markers
        run: |
          set -euo pipefail
          if git grep -E "^<<<<<<<|^=======|^>>>>>>>" -- . ':(exclude)node_modules'; then
            echo "❌ Merge conflict markers found in source code!"
            exit 1
          fi
      - name: 🔍 Any Scanner
        run: |
          set -euo pipefail
          ANY_COUNT=$(npm run any-scanner --silent | tail -n 1)
          echo "Any count: $ANY_COUNT"
          if [ "$ANY_COUNT" -gt 0 ]; then
            echo "❌ ERROR: Detected $ANY_COUNT 'any' usages. Zero tolerance."
            exit 1
          fi
      - name: 📝 Lint
        run: |
          set -euo pipefail
          npm run lint:strict
      - name: 📐 Type Check
        run: npm run check-types
      - name: 🧪 Tests
        run: npm run test
      - name: 🔐 Security Audit
        run: |
          set -euo pipefail
          npm audit --audit-level=high
          AUDIT_EXIT=$?
          if [ $AUDIT_EXIT -ne 0 ]; then
            echo "❌ Security audit failed with exit code $AUDIT_EXIT"
            exit $AUDIT_EXIT
          fi

  deploy-core:
    name: 🚀 Deploy Core
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs: entropy-check
    if: github.event_name == 'push'
    timeout-minutes: 15
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      BORG_SECRET_KEY: ${{ secrets.BORG_SECRET_KEY }}
      FRONTEND_BOT_TOKEN: ${{ secrets.FRONTEND_BOT_TOKEN }}
      BACKEND_BOT_TOKEN: ${{ secrets.BACKEND_BOT_TOKEN }}
      TELEGRAM_ADMIN_IDS: ${{ secrets.TELEGRAM_ADMIN_IDS }}

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --ignore-scripts

      - name: 🗄️ Apply D1 Migrations
        run: npx wrangler d1 migrations apply borgptron-db --remote
        working-directory: borg-core-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: 🔱 Deploy Core Worker
        id: deploy
        run: |
          npx wrangler deploy > deploy.log 2>&1 || (cat deploy.log && exit 1)
          cat deploy.log
          URL=$(grep -o "https://[^ ]*workers\.dev" deploy.log | head -n 1)
          if [ -z "$URL" ]; then
            echo "❌ Deployment failed or URL not found"
            exit 1
          fi
          echo "core_url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Core deployed: $URL"
        working-directory: borg-core-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: 🔗 Activate Webhooks
        working-directory: borg-core-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          CORE_URL="${{ steps.deploy.outputs.core_url }}"
          # Frontend Webhook
          RESULT_FE=$(curl -fsS -X POST "https://api.telegram.org/bot${FRONTEND_BOT_TOKEN}/setWebhook" \
            -d "url=${CORE_URL}/webhook/frontend" \
            -d "secret_token=${BORG_SECRET_KEY}")
          echo "$RESULT_FE" | grep -q '"ok":true' || { echo "❌ Frontend Webhook failed: $RESULT_FE"; exit 1; }

          # Backend Webhook
          RESULT_BE=$(curl -fsS -X POST "https://api.telegram.org/bot${BACKEND_BOT_TOKEN}/setWebhook" \
            -d "url=${CORE_URL}/webhook/backend" \
            -d "secret_token=${BORG_SECRET_KEY}")
          echo "$RESULT_BE" | grep -q '"ok":true' || { echo "❌ Backend Webhook failed: $RESULT_BE"; exit 1; }

          # Sync missing secrets to Wrangler (F-01)
          # We only sync TELEGRAM_ADMIN_IDS here as other secrets are handled by wrangler deploy implicitly
          # if set via wrangler secret put, but for CI we need to ensure they are available.
          # Note: In a real CI environment, 'wrangler deploy' might not pick up these env vars
          # as secrets unless they are in wrangler.toml [vars] or explicitly put.
          # The audit says they are omitted from synchronization.
          for SECRET_NAME in GEMINI_API_KEY BORG_SECRET_KEY FRONTEND_BOT_TOKEN BACKEND_BOT_TOKEN; do
             echo "Syncing $SECRET_NAME..."
             echo "${!SECRET_NAME}" | npx wrangler secret put $SECRET_NAME
          done

          echo "✅ Webhooks activated and secrets synced"

      - name: 📢 Notify Success
        if: success()
        run: |
          set -euo pipefail
          # Enviar notificación a todos los admins definidos en TELEGRAM_ADMIN_IDS
          IFS=',' read -ra ADM_IDS <<< "${{ secrets.TELEGRAM_ADMIN_IDS }}"
          for ADM_ID in "${ADM_IDS[@]}"; do
            curl -s -X POST "https://api.telegram.org/bot${BACKEND_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${ADM_ID}" \
              -d "text=✅ <b>TITANIUM CORE UNIFIED</b>%0A%0ADespliegue y sincronización de webhooks completada con éxito." \
              -d "parse_mode=HTML"
          done
