name: CI

on:
  push:
    branches: [main, titan]
  pull_request:
    branches: [main, titan]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint:strict
      - name: Type Check
        run: npm run check-types
      - name: Test
        run: npm run test
      - name: Any Scanner
        run: |
          ANY_COUNT=$(npm run any-scanner)
          echo "Any count: $ANY_COUNT"
          if [ "$ANY_COUNT" -gt 0 ]; then
            echo "Error: 'any' type or cast detected in production code."
            exit 1
          fi
